name: Feature request
description: Suggest an improvement or new capability
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for project scope.

  - type: textarea
    id: problem
    attributes:
      label: What you're trying to do
      description: The user-facing problem — e.g. a Redmine endpoint or workflow the server doesn't cover yet.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like the server to provide (tool name + rough signature welcome).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What you tried or considered first — e.g. whether the `redmine_request` passthrough covers it today.

  - type: textarea
    id: context
    attributes:
      label: Additional context
