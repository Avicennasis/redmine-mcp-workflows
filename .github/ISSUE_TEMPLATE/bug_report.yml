name: Bug report
description: Something is broken or behaves unexpectedly
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report! Please fill out the sections below so the issue can be reproduced.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduce
      description: A minimal example — ideally the exact tool call (tool name + arguments) and the response you got back.
      placeholder: |
        # tool call + arguments, or a minimal script
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "redmine-mcp-workflows version / commit"
      description: "Version you installed, or the commit SHA you ran from."
      placeholder: "v0.9.0 or a1b2c3d"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "python3 --version"

  - type: input
    id: redmine-version
    attributes:
      label: Redmine version
      description: "Administration → Information in your Redmine instance."
      placeholder: "e.g. 5.1.3"

  - type: input
    id: mcp-client
    attributes:
      label: MCP client
      description: "What's talking to the server?"
      placeholder: "Claude Code / Claude Desktop / other + version"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any structured error payload, stack trace, or unexpected output. Redact your Redmine URL and API key.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — e.g. custom workflow/role configuration, whether the schema cache was stale.
