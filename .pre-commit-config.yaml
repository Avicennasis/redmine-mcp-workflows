# See https://pre-commit.com for usage and https://pre-commit.com/hooks.html for more hooks.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: py-compile
        name: python parse-check (py_compile)
        entry: python3 -m py_compile
        language: system
        types: [python]
        require_serial: false

      - id: pip-audit
        name: pip-audit
        entry: bash -c 'pip-audit -r requirements.txt'
        language: system
        pass_filenames: false
        stages: [pre-push, manual]
